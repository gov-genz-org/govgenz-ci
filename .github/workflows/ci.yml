# CI obligatoire pour les rulesets GitHub (checks : ci/test, ci/build).
# Build : PR + branches de travail. Deploy : staging auto sur develop ou manuel, prod sur main.

name: CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop
      - feature/**
      - fix/**
      - hotfix/**


concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ci/test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@8358ee0e2e8afe63c2fb8253d1d52085811ab1e5
        with:
          php-version: "8.2"
          extensions: intl, mbstring, mysqli, sqlite3, pcov
          coverage: pcov

      - uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: PHPUnit (Unit + App, sans BDD MySQL projet)
        run: vendor/bin/phpunit --configuration phpunit.xml.dist --coverage-text --coverage-clover build/coverage/clover.xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phpunit-coverage
          path: |
            build/coverage/
            build/logs/logfile.xml
          if-no-files-found: ignore

      - name: env.example changed
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          if git diff --name-only "origin/${{ github.base_ref }}"...HEAD | grep -qx 'env.example'; then
            echo "::warning::env.example a changé — mettre à jour les secrets GitHub (environments) et/ou deploy/generate-dotenv.sh. Voir docs/CI-CD.md"
          fi

  build:
    name: ci/build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@8358ee0e2e8afe63c2fb8253d1d52085811ab1e5
        with:
          php-version: "8.2"
          extensions: intl, mbstring, mysqli, sqlite3
          coverage: none

      - uses: actions/cache@v4
        with:
          path: vendor
          key: composer-prod-${{ hashFiles('composer.lock') }}
          restore-keys: composer-prod-

      - name: Production install
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Verify spark
        run: php spark list

      - name: Validate env.example template
        run: php spark env:check --template-only

      - name: Stamp deploy version
        run: |
          {
            echo "${{ github.sha }}"
            echo "event=${{ github.event_name }}"
            echo "ref=${{ github.ref_name }}"
            echo "run=${{ github.run_id }}"
          } > writable/deploy_version.txt

      - name: Prepare writable for deploy
        run: |
          for dir in cache logs session debugbar uploads backups; do
            find "writable/${dir}" -mindepth 1 ! -name 'index.html' -delete 2>/dev/null || true
            mkdir -p "writable/${dir}"
            touch "writable/${dir}/index.html"
          done
          mkdir -p uploads/cms
          touch uploads/cms/index.html

      - name: Verify release tree (build)
        run: bash deploy/verify-release.sh .

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: govgenz-release
          # v4.4+ : les fichiers « cachés » (.htaccess, etc.) sont exclus par défaut — obligatoire pour public/
          include-hidden-files: true
          path: |
            app/
            public/
            vendor/
            writable/
            deploy/
            index.php
            spark
            preload.php
            composer.json
            composer.lock
            .htaccess
            env.example
          retention-days: 7

  deploy-staging:
    name: deploy/staging
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 90
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/develop') ||
      github.event_name == 'workflow_dispatch'
    environment: staging
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/download-artifact@v4
        with:
          name: govgenz-release
          path: release/

      - name: Verify release artifact (staging)
        run: bash deploy/verify-release.sh release

      - name: Generate .env from GitHub secrets (staging)
        if: vars.DEPLOY_GENERATE_ENV == 'true'
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          DATABASE_HOSTNAME: ${{ secrets.DATABASE_HOSTNAME }}
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          DATABASE_USERNAME: ${{ secrets.DATABASE_USERNAME }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          DATABASE_PORT: ${{ secrets.DATABASE_PORT }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          CI_ENVIRONMENT: ${{ vars.CI_ENVIRONMENT }}
          APP_FORCE_HTTPS: ${{ vars.APP_FORCE_HTTPS }}
          SESSION_EXPIRATION: ${{ vars.SESSION_EXPIRATION }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_FROM_NAME: ${{ vars.EMAIL_FROM_NAME }}
          JOIN_NOTIFICATION_TO: ${{ secrets.JOIN_NOTIFICATION_TO }}
          EMAIL_PROTOCOL: ${{ vars.EMAIL_PROTOCOL }}
          STAFF_INVITE_EXPIRY_HOURS: ${{ vars.STAFF_INVITE_EXPIRY_HOURS }}
          ANALYTICS_ENABLED: ${{ vars.ANALYTICS_ENABLED }}
          ANALYTICS_GA4_ID: ${{ secrets.ANALYTICS_GA4_ID }}
          ANALYTICS_PRIVACY_SLUG: ${{ vars.ANALYTICS_PRIVACY_SLUG }}
          PROJECTS_USE_PATH_PREFIX: ${{ vars.PROJECTS_USE_PATH_PREFIX }}
          POSITIONS_USE_PATH_PREFIX: ${{ vars.POSITIONS_USE_PATH_PREFIX }}
          PROJECTS_HOST: ${{ vars.PROJECTS_HOST }}
          PROJECTS_BASE_URL: ${{ secrets.PROJECTS_BASE_URL }}
          POSITIONS_HOST: ${{ vars.POSITIONS_HOST }}
          POSITIONS_BASE_URL: ${{ secrets.POSITIONS_BASE_URL }}
          APP_ASSET_VERSION: ${{ vars.APP_ASSET_VERSION }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          rm -f release/.env
          bash deploy/generate-dotenv.sh release/.env
          wc -l release/.env
          ! grep -q 'database.default.hostname.*database.default' release/.env
          ! grep -qE 'REMPLACER|CHANGER_MOT_DE_PASSE|encryption\.key = hex2bin:REMPLACER' release/.env

      # Pas de cache d’état FTP : après effacement serveur, un état obsolète empêche de ré-uploader public/, vendor/, etc.
      - name: Reset FTP sync state (staging — upload complet)
        run: rm -f release/.ftp-deploy-sync-staging.json

      # Une seule passe FTP (release/ complet). Ne jamais resynchroniser un sous-dossier seul.
      - name: Deploy to FTP (staging, .env généré inclus)
        if: vars.DEPLOY_GENERATE_ENV == 'true'
        uses: SamKirkland/FTP-Deploy-Action@a51268f67f6605236975928ae28b0f7e9971d50a
        with:
          server: ${{ secrets.FTP_STAGING_SERVER }}
          username: ${{ secrets.FTP_STAGING_USERNAME }}
          password: ${{ secrets.FTP_STAGING_PASSWORD }}
          local-dir: release/
          server-dir: ${{ secrets.FTP_STAGING_REMOTE_DIR }}
          state-name: .ftp-deploy-sync-staging.json
          log-level: standard
          exclude: |
            **/.git*
            **/.github/**
            **/tests/**
            **/docs/**
            **/env.local
            **/env.*.example
            **/phpunit*
            **/writable/uploads/**
            **/uploads/**
            **/public/uploads/**

      - name: Deploy to FTP (staging, .env serveur préservé)
        if: vars.DEPLOY_GENERATE_ENV != 'true'
        uses: SamKirkland/FTP-Deploy-Action@a51268f67f6605236975928ae28b0f7e9971d50a
        with:
          server: ${{ secrets.FTP_STAGING_SERVER }}
          username: ${{ secrets.FTP_STAGING_USERNAME }}
          password: ${{ secrets.FTP_STAGING_PASSWORD }}
          local-dir: release/
          server-dir: ${{ secrets.FTP_STAGING_REMOTE_DIR }}
          state-name: .ftp-deploy-sync-staging.json
          log-level: standard
          exclude: |
            **/.git*
            **/.github/**
            **/tests/**
            **/docs/**
            **/.env
            **/env.local
            **/env.*.example
            **/phpunit*
            **/writable/uploads/**
            **/uploads/**
            **/public/uploads/**

  deploy-production:
    name: deploy/production
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 90
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/download-artifact@v4
        with:
          name: govgenz-release
          path: release/

      - name: Verify release artifact (production)
        run: bash deploy/verify-release.sh release

      - name: Generate .env from GitHub secrets (production)
        if: vars.DEPLOY_GENERATE_ENV == 'true'
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          DATABASE_HOSTNAME: ${{ secrets.DATABASE_HOSTNAME }}
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          DATABASE_USERNAME: ${{ secrets.DATABASE_USERNAME }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          DATABASE_PORT: ${{ secrets.DATABASE_PORT }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          CI_ENVIRONMENT: ${{ vars.CI_ENVIRONMENT }}
          APP_FORCE_HTTPS: ${{ vars.APP_FORCE_HTTPS }}
          SESSION_EXPIRATION: ${{ vars.SESSION_EXPIRATION }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_FROM_NAME: ${{ vars.EMAIL_FROM_NAME }}
          JOIN_NOTIFICATION_TO: ${{ secrets.JOIN_NOTIFICATION_TO }}
          EMAIL_PROTOCOL: ${{ vars.EMAIL_PROTOCOL }}
          STAFF_INVITE_EXPIRY_HOURS: ${{ vars.STAFF_INVITE_EXPIRY_HOURS }}
          ANALYTICS_ENABLED: ${{ vars.ANALYTICS_ENABLED }}
          ANALYTICS_GA4_ID: ${{ secrets.ANALYTICS_GA4_ID }}
          ANALYTICS_PRIVACY_SLUG: ${{ vars.ANALYTICS_PRIVACY_SLUG }}
          PROJECTS_USE_PATH_PREFIX: ${{ vars.PROJECTS_USE_PATH_PREFIX }}
          POSITIONS_USE_PATH_PREFIX: ${{ vars.POSITIONS_USE_PATH_PREFIX }}
          PROJECTS_HOST: ${{ vars.PROJECTS_HOST }}
          PROJECTS_BASE_URL: ${{ secrets.PROJECTS_BASE_URL }}
          POSITIONS_HOST: ${{ vars.POSITIONS_HOST }}
          POSITIONS_BASE_URL: ${{ secrets.POSITIONS_BASE_URL }}
          APP_ASSET_VERSION: ${{ vars.APP_ASSET_VERSION }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          rm -f release/.env
          bash deploy/generate-dotenv.sh release/.env
          wc -l release/.env
          ! grep -q 'database.default.hostname.*database.default' release/.env
          ! grep -qE 'REMPLACER|CHANGER_MOT_DE_PASSE|encryption\.key = hex2bin:REMPLACER' release/.env

      - name: Reset FTP sync state (production — upload complet)
        run: rm -f release/.ftp-deploy-sync-production.json

      - name: Deploy to FTP (production, .env généré inclus)
        if: vars.DEPLOY_GENERATE_ENV == 'true'
        uses: SamKirkland/FTP-Deploy-Action@a51268f67f6605236975928ae28b0f7e9971d50a
        with:
          server: ${{ secrets.FTP_PRODUCTION_SERVER }}
          username: ${{ secrets.FTP_PRODUCTION_USERNAME }}
          password: ${{ secrets.FTP_PRODUCTION_PASSWORD }}
          local-dir: release/
          server-dir: ${{ secrets.FTP_PRODUCTION_REMOTE_DIR }}
          state-name: .ftp-deploy-sync-production.json
          log-level: standard
          exclude: |
            **/.git*
            **/.github/**
            **/tests/**
            **/docs/**
            **/env.local
            **/env.*.example
            **/phpunit*
            **/writable/uploads/**
            **/uploads/**
            **/public/uploads/**

      - name: Deploy to FTP (production, .env serveur préservé)
        if: vars.DEPLOY_GENERATE_ENV != 'true'
        uses: SamKirkland/FTP-Deploy-Action@a51268f67f6605236975928ae28b0f7e9971d50a
        with:
          server: ${{ secrets.FTP_PRODUCTION_SERVER }}
          username: ${{ secrets.FTP_PRODUCTION_USERNAME }}
          password: ${{ secrets.FTP_PRODUCTION_PASSWORD }}
          local-dir: release/
          server-dir: ${{ secrets.FTP_PRODUCTION_REMOTE_DIR }}
          state-name: .ftp-deploy-sync-production.json
          log-level: standard
          exclude: |
            **/.git*
            **/.github/**
            **/tests/**
            **/docs/**
            **/.env
            **/env.local
            **/env.*.example
            **/phpunit*
            **/writable/uploads/**
            **/uploads/**
            **/public/uploads/**

  # Tag Git après merge sur main : develop → minor ; fix/* ou hotfix/* → patch.
  release-tag:
    name: release/tag
    runs-on: ubuntu-latest
    needs: deploy-production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git author
        run: |
          git config user.name "GovGenZ Release"
          git config user.email "noreply@govgenz.org"

      - name: Compute next release tag
        id: tag
        run: |
          chmod +x deploy/next-release-tag.sh deploy/detect-release-bump.sh
          if git tag --points-at HEAD | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            existing=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)
            echo "already_tagged=true" >> "$GITHUB_OUTPUT"
            echo "name=${existing}" >> "$GITHUB_OUTPUT"
            echo "HEAD déjà tagué : ${existing}"
            exit 0
          fi
          bump=$(./deploy/detect-release-bump.sh)
          name=$(./deploy/next-release-tag.sh "$bump")
          echo "bump=${bump}" >> "$GITHUB_OUTPUT"
          echo "already_tagged=false" >> "$GITHUB_OUTPUT"
          echo "name=${name}" >> "$GITHUB_OUTPUT"
          echo "Prochain tag (${bump}) : ${name}"

      - name: Create and push annotated tag
        if: steps.tag.outputs.already_tagged != 'true'
        env:
          TAG: ${{ steps.tag.outputs.name }}
          BUMP: ${{ steps.tag.outputs.bump }}
        run: |
          kind="Production release"
          if [[ "$BUMP" == "patch" ]]; then
            kind="Hotfix release"
          fi
          git tag -a "$TAG" -m "$(cat <<EOF
          ${kind} ${TAG}

          Commit: ${{ github.sha }}
          Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF
          )"
          git push origin "$TAG"
          echo "::notice::Tag ${TAG} créé sur origin (commit ${{ github.sha }})"

      - name: Open PR on develop (VERSION + CHANGELOG after release)
        if: steps.tag.outputs.already_tagged != 'true'
        env:
          TAG: ${{ steps.tag.outputs.name }}
          BUMP: ${{ steps.tag.outputs.bump }}
          RELEASE_PR_TOKEN: ${{ secrets.RELEASE_PR_TOKEN }}
        run: |
          chmod +x deploy/next-develop-version.sh deploy/update-changelog.sh
          branch="release/post-${TAG}-version"
          repo="${{ github.server_url }}/${{ github.repository }}"
          manual_pr_url="${repo}/compare/develop...${branch}?expand=1"

          if [[ -n "$RELEASE_PR_TOKEN" ]]; then
            export GH_TOKEN="$RELEASE_PR_TOKEN"
            echo "Création PR avec RELEASE_PR_TOKEN"
          else
            export GH_TOKEN="${{ github.token }}"
            echo "::notice::RELEASE_PR_TOKEN absent — gh utilise GITHUB_TOKEN (policy org « create pull requests » requise)."
          fi

          git fetch origin develop main --tags
          if git ls-remote --exit-code --heads origin "$branch" >/dev/null 2>&1; then
            git fetch origin "$branch"
            git checkout -B "$branch" "origin/$branch"
          else
            git checkout develop
            git pull --ff-only origin develop
            next=$(./deploy/next-develop-version.sh "$TAG")
            current=$(tr -d '[:space:]' < VERSION 2>/dev/null || true)
            if [[ "$current" != "$next" ]]; then
              printf '%s\n' "$next" > VERSION
            fi
            ./deploy/update-changelog.sh "$TAG" "$BUMP" "${{ github.sha }}"
            if git diff --quiet -- VERSION CHANGELOG.md; then
              echo "VERSION et CHANGELOG déjà à jour sur develop"
              exit 0
            fi
            git checkout -b "$branch"
            git add VERSION CHANGELOG.md
            git commit -m "release: increase next develop version"
            git push -u origin "$branch"
          fi

          next=$(tr -d '[:space:]' < VERSION 2>/dev/null || true)
          current=$(git show develop:VERSION 2>/dev/null | tr -d '[:space:]' || true)

          if gh pr list --head "$branch" --base develop --state open --json url --jq '.[0].url' | grep -q .; then
            pr_url=$(gh pr list --head "$branch" --base develop --state open --json url --jq '.[0].url')
            echo "::notice::PR déjà ouverte : ${pr_url}"
            exit 0
          fi

          pr_body_file=$(mktemp)
          printf '%s\n' \
            "Mise à jour automatique après le tag **${TAG}** sur \`main\`." \
            "" \
            "- \`VERSION\` : ${current:-?} → **${next}**" \
            "- \`CHANGELOG.md\` : section **${TAG}**" \
            "" \
            "Merger après **ci/test** (ruleset \`develop\`)." \
            > "$pr_body_file"
          if gh pr create \
            --base develop \
            --head "$branch" \
            --title "release: bump develop to ${next:-?} after ${TAG}" \
            --body-file "$pr_body_file"; then
            rm -f "$pr_body_file"
            echo "::notice::develop VERSION ${current:-∅} → ${next} ; CHANGELOG ${TAG} — PR créée"
            exit 0
          fi
          rm -f "$pr_body_file"
          echo "::warning::Branche ${branch} OK ; création PR refusée (policy org ou RELEASE_PR_TOKEN manquant)."
          echo "::warning::Automatiser : org Settings → Actions → Allow GitHub Actions to create pull requests — ou secret RELEASE_PR_TOKEN (voir docs/CI-CD.md)."
          echo "::notice::PR manuelle : ${manual_pr_url}"
          # Branche + commit livrés : ne pas faire échouer release/tag sur main (merge PR à la main).
          exit 0
